name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    name: Trivy Security Scan
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner in repo mode
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      continue-on-error: true
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Upload Trivy scan results as artifact
      uses: actions/upload-artifact@v7
      with:
        name: trivy-scan-results
        path: trivy-results.sarif
        retention-days: 30

    - name: Install Trivy CLI
      if: github.event_name == 'push'
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Run Trivy vulnerability scanner for Docker images
      if: github.event_name == 'push'
      continue-on-error: true
      run: |
        # Copy root lockfile to frontend directory for reproducible Docker builds
        cp bun.lock nextjs-ui-dashboard/bun.lock 2>/dev/null || true

        # Build images
        docker build -t rust-core-engine ./rust-core-engine
        docker build -t nextjs-ui-dashboard ./nextjs-ui-dashboard

        # Scan each image
        trivy image --format sarif --output rust-image-scan.sarif rust-core-engine
        trivy image --format sarif --output nextjs-image-scan.sarif nextjs-ui-dashboard

    - name: Upload Docker image scan results
      uses: github/codeql-action/upload-sarif@v4
      if: github.event_name == 'push'
      continue-on-error: true
      with:
        sarif_file: 'rust-image-scan.sarif'
        category: 'docker-rust'

    - name: Upload Next.js Docker image scan results
      uses: github/codeql-action/upload-sarif@v4
      if: github.event_name == 'push'
      continue-on-error: true
      with:
        sarif_file: 'nextjs-image-scan.sarif'
        category: 'docker-nextjs'

    - name: Upload Docker image scan results as artifacts
      uses: actions/upload-artifact@v7
      if: github.event_name == 'push'
      with:
        name: docker-image-scan-results
        path: |
          rust-image-scan.sarif
          nextjs-image-scan.sarif
        retention-days: 30

  codeql-analysis:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      continue-on-error: true
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
      continue-on-error: true

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      continue-on-error: true

  semgrep-scan:
    runs-on: ubuntu-latest
    name: Semgrep Security Scan

    container:
      image: returntocorp/semgrep

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run Semgrep
      run: |
        semgrep --config=auto --json --output=semgrep-results.json .

    # Temporarily disabled due to artifact storage quota
    # - name: Upload Semgrep results
    #   uses: actions/upload-artifact@v7
    #   if: always()
    #   with:
    #     name: semgrep-results
    #     path: semgrep-results.json

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Detection

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Run TruffleHog Secret Scan
      uses: trufflesecurity/trufflehog@v3.93.7
      continue-on-error: true
      with:
        path: ./
        extra_args: --only-verified

    - name: Run GitLeaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Security Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: 'stable'
        override: true

    - name: Node.js dependency check
      run: |
        cd nextjs-ui-dashboard
        npm audit --audit-level moderate --json > npm-audit.json || true

    - name: Rust dependency check
      run: |
        cd rust-core-engine
        cargo install --version 0.20.0 cargo-audit || cargo install cargo-audit --force || true
        cargo audit --json > cargo-audit.json || echo '{"vulnerabilities": [], "warnings": []}' > cargo-audit.json

    # Temporarily disabled due to artifact storage quota
    # - name: Upload dependency check results
    #   uses: actions/upload-artifact@v7
    #   if: always()
    #   with:
    #     name: dependency-check-results
    #     path: |
    #       nextjs-ui-dashboard/npm-audit.json
    #       rust-core-engine/cargo-audit.json

  license-check:
    runs-on: ubuntu-latest
    name: License Compliance Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install license checker
      run: |
        npm install -g license-checker

    - name: Check Node.js licenses
      run: |
        cd nextjs-ui-dashboard
        npm install
        license-checker --json --out nodejs-licenses.json

    - name: Check Rust licenses
      run: |
        cd rust-core-engine
        cargo install cargo-license
        cargo license --json > rust-licenses.json

    # Temporarily disabled due to artifact storage quota
    # - name: Upload license reports
    #   uses: actions/upload-artifact@v7
    #   with:
    #     name: license-reports
    #     path: |
    #       nextjs-ui-dashboard/nodejs-licenses.json
    #       rust-core-engine/rust-licenses.json

  security-report:
    runs-on: ubuntu-latest
    name: Security Report Summary
    needs: [trivy-scan, codeql-analysis, semgrep-scan, secret-scan, dependency-check, license-check]
    if: always()
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: Generate security summary
      run: |
        echo "# 🔒 Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "## Scan Results" >> security-summary.md
        echo "" >> security-summary.md
        
        # Check if each job succeeded
        echo "- **Trivy Scan**: ${{ needs.trivy-scan.result }}" >> security-summary.md
        echo "- **CodeQL Analysis**: ${{ needs.codeql-analysis.result }}" >> security-summary.md  
        echo "- **Semgrep Scan**: ${{ needs.semgrep-scan.result }}" >> security-summary.md
        echo "- **Secret Detection**: ${{ needs.secret-scan.result }}" >> security-summary.md
        echo "- **Dependency Check**: ${{ needs.dependency-check.result }}" >> security-summary.md
        echo "- **License Check**: ${{ needs.license-check.result }}" >> security-summary.md
        echo "" >> security-summary.md
        
        echo "## Recommendations" >> security-summary.md
        echo "" >> security-summary.md
        echo "1. Review all flagged vulnerabilities" >> security-summary.md
        echo "2. Update dependencies with known CVEs" >> security-summary.md
        echo "3. Remove any exposed secrets" >> security-summary.md
        echo "4. Verify license compliance" >> security-summary.md
        echo "" >> security-summary.md
        
        echo "Generated at: $(date)" >> security-summary.md

    # Temporarily disabled due to artifact storage quota
    # - name: Upload security summary
    #   uses: actions/upload-artifact@v7
    #   with:
    #     name: security-summary
    #     path: security-summary.md

    - name: Comment security summary on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });