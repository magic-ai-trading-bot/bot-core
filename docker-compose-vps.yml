# Bot Core - VPS Deployment
# Core services: MongoDB, Redis, Rust API, Frontend, MCP Server, OpenClaw

services:
  # ============================================
  # CORE SERVICES
  # ============================================

  # MongoDB - Primary database
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    command: ["--bind_ip_all", "--port", "27017"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:?MONGO_ROOT_USER must be set in .env}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD must be set in .env}
      - MONGO_INITDB_DATABASE=bot_core
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  # Rust Core Engine
  rust-core-engine:
    build:
      context: ./rust-core-engine
      dockerfile: Dockerfile
    container_name: rust-core-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secure_password_123}@mongodb:27017/bot_core?authSource=admin
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - BINANCE_FUTURES_TESTNET_API_KEY=${BINANCE_FUTURES_TESTNET_API_KEY:-}
      - BINANCE_FUTURES_TESTNET_SECRET_KEY=${BINANCE_FUTURES_TESTNET_SECRET_KEY:-}
      - BINANCE_TESTNET=true
      - TRADING_ENABLED=true
      # Use mainnet for market data (public, no auth needed, more reliable than testnet)
      - BINANCE_BASE_URL=https://api.binance.com
      - BINANCE_WS_URL=wss://stream.binance.com:9443/ws
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
    volumes:
      - ./rust-core-engine/data:/app/data
      - ./rust-core-engine/logs:/app/logs
      - ./rust-core-engine/config.toml:/app/config.toml
      - ./rust-core-engine/config/paper-trading-defaults.yml:/app/config/paper-trading-defaults.yml:ro
      - ./rust-core-engine/config/real-trading-defaults.yml:/app/config/real-trading-defaults.yml:ro
    networks:
      - bot-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 900s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  # Next.js UI Dashboard
  nextjs-ui-dashboard:
    build:
      context: .
      dockerfile: nextjs-ui-dashboard/Dockerfile
      args:
        - VITE_RUST_API_URL=${VITE_RUST_API_URL:-http://localhost:8080}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080/ws}
    container_name: nextjs-ui-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - bot-network
    depends_on:
      rust-core-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================
  # CACHE
  # ============================================

  # Redis - Cache
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================
  # MCP & OPENCLAW
  # ============================================

  # OpenClaw Gateway - AI assistant via Telegram/WhatsApp
  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=Asia/Ho_Chi_Minh
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY:-}
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY:-}
      - CLAUDE_WEB_COOKIE=${CLAUDE_WEB_COOKIE:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID:-}
      - WHATSAPP_PHONE_NUMBER=${WHATSAPP_PHONE_NUMBER:-}
      - MCP_URL=http://mcp-server:8090
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - NODE_ENV=production
    volumes:
      - ./openclaw/config:/config-source:ro
      - ./openclaw/workspace:/workspace-source:ro
      - openclaw_home:/home/node/.openclaw
    networks:
      - bot-network
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/__openclaw__/canvas/ > /dev/null || pgrep -f openclaw > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  # MCP Server - Bridges OpenClaw/Claude to BotCore APIs
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - RUST_API_URL=http://rust-core-engine:8080
      - BOTCORE_EMAIL=${BOTCORE_EMAIL:-}
      - BOTCORE_PASSWORD=${BOTCORE_PASSWORD:-}
      - MCP_PORT=8090
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - NODE_ENV=production
    networks:
      - bot-network
    depends_on:
      rust-core-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  bot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  openclaw_home:
